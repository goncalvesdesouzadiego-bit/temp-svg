<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vera Solutions – Scroll Line Animation Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow-x: hidden; }

  .page-wrapper {
    width: 100vw;
    overflow: hidden;
  }

  .page-container {
    position: relative;
    width: 1920px;
    transform-origin: top left;
  }

  .page-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .page-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .line-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0;
    background: #1a1a2e;
    color: white;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    font-family: 'Segoe UI', sans-serif;
    transition: opacity 0.6s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-overlay h2 { font-size: 22px; font-weight: 300; margin-bottom: 8px; }
  .loading-overlay p { font-size: 13px; opacity: 0.5; }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #f5a623;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress bar */
  .scroll-progress {
    position: fixed; top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #f5a623, #e8961e);
    z-index: 100; width: 0%;
  }

  /* Instructions */
  .instructions {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 28px; border-radius: 30px;
    font-size: 14px;
    font-family: 'Segoe UI', sans-serif;
    z-index: 100;
    backdrop-filter: blur(10px);
    transition: opacity 0.6s ease;
    pointer-events: none;
    border: 1px solid rgba(245,166,35,0.3);
    opacity: 0;
  }
  .instructions.visible { opacity: 1; }
  .instructions .accent { color: #f5a623; font-weight: 600; }

  /* Debug (press D) */
  .debug-panel {
    position: fixed; top: 10px; right: 10px;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    font-family: monospace; font-size: 11px;
    padding: 10px 14px; border-radius: 8px;
    z-index: 200; display: none; line-height: 1.6;
  }
  .debug-panel.visible { display: block; }

  /* Error */
  .error-overlay {
    position: fixed; inset: 0;
    background: #1a1a2e;
    color: white;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1001;
    font-family: 'Segoe UI', sans-serif;
  }
  .error-overlay.visible { display: flex; }
  .error-overlay h2 { font-size: 22px; font-weight: 300; margin-bottom: 12px; }
  .error-overlay p { font-size: 13px; opacity: 0.6; max-width: 500px; text-align: center; line-height: 1.7; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <h2>Carregando mockup...</h2>
  <p>Preparando a animação da linha</p>
</div>

<div class="error-overlay" id="errorOverlay">
  <h2>Erro ao carregar</h2>
  <p id="errorMsg"></p>
</div>

<div class="scroll-progress" id="progress"></div>

<div class="instructions" id="instructions">
  <span class="accent">↓</span> Role para baixo para animar a linha <span class="accent">↓</span>
</div>

<div class="debug-panel" id="debug"></div>

<div class="page-wrapper" id="pageWrapper">
  <div class="page-container" id="pageContainer">
    <div class="page-bg">
      <img src="Home.png" alt="Vera Solutions Homepage" id="bgImage" />
    </div>
    <div class="line-overlay" id="lineOverlay"></div>
  </div>
</div>

<script>
(async function() {
  const loading = document.getElementById('loading');
  const errorOverlay = document.getElementById('errorOverlay');
  const errorMsg = document.getElementById('errorMsg');
  const progressBar = document.getElementById('progress');
  const instructionsEl = document.getElementById('instructions');
  const overlay = document.getElementById('lineOverlay');
  const debugPanel = document.getElementById('debug');
  const pageContainer = document.getElementById('pageContainer');
  const pageWrapper = document.getElementById('pageWrapper');

  // --- SCALE TO VIEWPORT ---
  const SVG_WIDTH = 1920;
  const SVG_HEIGHT = 9759.58;

  function scaleToFit() {
    const vw = window.innerWidth;
    const scale = vw / SVG_WIDTH;
    pageContainer.style.transform = `scale(${scale})`;
    pageContainer.style.height = SVG_HEIGHT + 'px';
    pageWrapper.style.height = (SVG_HEIGHT * scale) + 'px';
    return scale;
  }

  let currentScale = scaleToFit();
  window.addEventListener('resize', () => { currentScale = scaleToFit(); });

  // --- DEBUG ---
  let debugVisible = false;
  document.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') {
      debugVisible = !debugVisible;
      debugPanel.classList.toggle('visible', debugVisible);
    }
  });

  // --- LOAD SVG ---
  try {
    const response = await fetch('Line 2.svg');
    if (!response.ok) throw new Error(`HTTP ${response.status} — verifique se "Line 2.svg" está no mesmo diretório.`);
    const svgText = await response.text();

    overlay.innerHTML = svgText;
    const svg = overlay.querySelector('svg');
    if (!svg) throw new Error('Nenhum elemento <svg> encontrado no arquivo.');

    // Fill container
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.removeAttribute('width');
    svg.removeAttribute('height');

    // Parse viewBox
    const viewBox = svg.getAttribute('viewBox');
    if (!viewBox) throw new Error('SVG não tem viewBox.');
    const vbParts = viewBox.split(/[\s,]+/).map(Number);
    const vbX = vbParts[0], vbY = vbParts[1];
    const vbWidth = vbParts[2], vbHeight = vbParts[3];

    // --- CLIP-PATH REVEAL ---
    // Create a clipPath that reveals from top to bottom
    // This preserves ALL original styles (dotted, dashed, colors, etc.)
    const ns = 'http://www.w3.org/2000/svg';

    // Check if SVG already has a <defs>, reuse it
    let defs = svg.querySelector('defs');
    if (!defs) {
      defs = document.createElementNS(ns, 'defs');
      svg.insertBefore(defs, svg.firstChild);
    }

    const clipPath = document.createElementNS(ns, 'clipPath');
    clipPath.setAttribute('id', 'scroll-clip');

    const clipRect = document.createElementNS(ns, 'rect');
    clipRect.setAttribute('x', vbX - 10);
    clipRect.setAttribute('y', vbY);
    clipRect.setAttribute('width', vbWidth + 20);
    clipRect.setAttribute('height', '0');
    clipPath.appendChild(clipRect);
    defs.appendChild(clipPath);

    // Wrap all content (except defs) in a clipped group
    const group = document.createElementNS(ns, 'g');
    group.setAttribute('clip-path', 'url(#scroll-clip)');

    const children = Array.from(svg.children).filter(c => c !== defs);
    children.forEach(child => group.appendChild(child));
    svg.appendChild(group);

    // --- READY ---
    loading.classList.add('hidden');
    setTimeout(() => loading.style.display = 'none', 600);
    instructionsEl.classList.add('visible');

    let hasScrolled = false;

    function onScroll() {
      const scrollTop = window.scrollY;
      const windowHeight = window.innerHeight;
      const pageHeight = parseFloat(pageWrapper.style.height);
      const docHeight = Math.max(pageHeight - windowHeight, 1);
      const scrollPercent = Math.min(scrollTop / docHeight, 1);

      // Progress bar
      progressBar.style.width = (scrollPercent * 100) + '%';

      // Hide instructions
      if (!hasScrolled && scrollTop > 100) {
        hasScrolled = true;
        instructionsEl.classList.remove('visible');
      }

      // Viewport bottom as fraction of total page
      const viewportBottomFraction = Math.min((scrollTop + windowHeight) / pageHeight, 1);

      // Reveal SVG up to viewport position
      const revealHeight = viewportBottomFraction * vbHeight;
      clipRect.setAttribute('height', revealHeight);

      // Debug
      if (debugVisible) {
        debugPanel.innerHTML = [
          `scroll: ${scrollTop.toFixed(0)}px`,
          `progress: ${(scrollPercent * 100).toFixed(1)}%`,
          `reveal: ${(viewportBottomFraction * 100).toFixed(1)}%`,
          `clipH: ${revealHeight.toFixed(0)} / ${vbHeight.toFixed(0)}`,
          `scale: ${currentScale.toFixed(3)}`
        ].join('<br>');
      }
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { onScroll(); ticking = false; });
        ticking = true;
      }
    });
    window.addEventListener('resize', () => {
      if (!ticking) {
        requestAnimationFrame(() => { onScroll(); ticking = false; });
        ticking = true;
      }
    });

    onScroll();

  } catch (error) {
    loading.style.display = 'none';
    errorMsg.innerHTML = `${error.message}<br><br><span style="opacity:0.4;font-size:11px;">Dica: se estiver abrindo direto do disco (file://), abra via servidor web ou GitHub Pages.</span>`;
    errorOverlay.classList.add('visible');
  }
})();
</script>

</body>
</html>
